<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Text & Particle Visualizer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #040404;
            font-family: ui-sans-serif, system-ui, sans-serif;
            color: #fff;
        }
        #visualizer-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #webcam {
            display: none;
        }
        #tracking-overlay {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background-color: rgba(0, 0, 0, 0.6);
            transform: scaleX(-1);
        }
    </style>
</head>
<body>

    <canvas id="visualizer-canvas"></canvas>
    <canvas id="tracking-overlay" width="240" height="180"></canvas>
    <video id="webcam" autoplay playsinline></video>

    <div class="absolute top-6 left-6 z-10 w-80 bg-black/50 backdrop-blur-md border border-white/10 rounded-2xl p-5 shadow-2xl">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-lg font-bold tracking-wide bg-gradient-to-r bg-clip-text text-transparent from-indigo-400 to-pink-400">Quantum Core Text</h1>
            <span id="fps-counter" class="text-xs font-mono bg-white/10 px-2 py-0.5 rounded text-pink-300">-- FPS</span>
        </div>
        
        <p class="text-xs text-slate-400 mb-4 leading-relaxed border-b border-white/5 pb-3">
            <strong class="text-pink-400">Right Hand Exclusive:</strong> Gunakan tangan kanan fisik Anda untuk menggeser, memutar, dan memperbesar partikel berbentuk tulisan teks 3D.
        </p>

        <div class="mb-5">
            <label class="block text-xs font-semibold tracking-wider text-slate-300 uppercase mb-2">Preset System</label>
            <select id="preset-select" class="w-full bg-white/5 border border-white/10 text-sm rounded-lg p-2 text-white focus:outline-none focus:border-pink-500 cursor-pointer">
                <option value="solar" selected>Solar System</option>
                <option value="universe">Observable Universe</option>
                <option value="love">I Love You (Teks 3D)</option>
            </select>
        </div>

        <div class="mb-5">
            <div class="flex items-center justify-between mb-2">
                <label class="block text-xs font-semibold tracking-wider text-slate-300 uppercase">Audio Reactivity</label>
                <span id="audio-status" class="text-[10px] text-rose-400 font-mono uppercase">Inactive</span>
            </div>
            <button id="audio-btn" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-medium text-xs py-2 px-4 rounded-lg transition duration-200 cursor-pointer flex items-center justify-center gap-2 shadow-lg shadow-pink-600/20">
                Initialize Audio Spectrum
            </button>
        </div>

        <div class="space-y-1.5 text-xs font-mono text-slate-400 border-t border-white/5 pt-3">
            <div class="flex justify-between"><span>Tracking State:</span><span id="tracking-status" class="text-amber-400">Memuat Kamera...</span></div>
            <div class="flex justify-between"><span>Active Particles:</span><span id="particle-count" class="text-slate-200">0</span></div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, particleSystem;
        let particleCount = 25000; 
        let currentPreset = 'solar';

        // LERP Target & Current Variables
        let targetPositionX = 0, targetPositionY = 0, targetScale = 1.0, targetRotationZ = 0;
        let currentPositionX = 0, currentPositionY = 0, currentScale = 1.0, currentRotationZ = 0;
        const LERP_FACTOR = 0.08; 

        let lastTime = performance.now(), frameCount = 0;
        let audioContext, analyser, dataArray, isAudioInitialized = false, audioIntensity = 0;
        let trackingCanvas, trackingCtx;

        let customUniforms = {
            uTime: { value: 0.0 },
            uAudioIntensity: { value: 0.0 },
            uPreset: { value: 0.0 } 
        };

        // --- Shader Pipeline (GLSL) ---
        const vertexShader = `
            uniform float uTime;
            uniform float uAudioIntensity;
            uniform float uPreset;
            attribute float aSpeed;
            attribute vec3 aRandom;
            varying vec3 vColor;
            varying float vPreset;

            void main() {
                vPreset = uPreset;
                vec3 transformed = position;
                
                if (uPreset < 0.5) {
                    // --- Solar System ---
                    float orbitRadius = length(position.xz);
                    float angle = uTime * aSpeed * 0.5 + aRandom.x * 6.28;
                    if (orbitRadius < 2.0) {
                        transformed = position + sin(uTime * 3.0 + aRandom * 10.0) * (0.05 + uAudioIntensity * 0.15);
                        vColor = vec3(1.0, 0.4, 0.0);
                    } else {
                        transformed.x = cos(angle) * orbitRadius;
                        transformed.z = sin(angle) * orbitRadius;
                        transformed.y = sin(uTime * aSpeed + orbitRadius) * 0.2 * (1.0 + uAudioIntensity);
                        if (orbitRadius > 12.0) vColor = vec3(0.4, 0.6, 1.0);
                        else if (orbitRadius > 6.0) vColor = vec3(0.85, 0.7, 0.45);
                        else vColor = vec3(0.9, 0.4, 0.2);
                    }
                } 
                else if (uPreset < 1.5) {
                    // --- Observable Universe ---
                    float expansion = 1.0 + (uTime * 0.02) + (uAudioIntensity * 0.4);
                    transformed = position * expansion;
                    float dist = length(transformed);
                    vColor = mix(vec3(0.1, 0.2, 0.6), vec3(0.8, 0.1, 0.5), clamp(dist / 30.0, 0.0, 1.0));
                } 
                else {
                    // --- Teks 3D "I LOVE YOU" (Merespons Detak & Audio) ---
                    float pulse = 1.0 + sin(uTime * 3.0) * 0.05 + (uAudioIntensity * 0.1);
                    transformed.xy *= pulse;
                    
                    // Efek dispersi/disintegrasi partikel acak bergelombang secara elegan pada sumbu Z
                    transformed.z += sin(uTime * 2.0 + position.x * 0.2) * 0.5 * (1.0 + uAudioIntensity * 2.0);
                    
                    // Warna Gradasi Merah Muda Neon (Hot Pink ke Deep Rose)
                    float factor = clamp((position.x + 15.0) / 30.0, 0.0, 1.0);
                    vColor = mix(vec3(1.0, 0.3, 0.6), vec3(0.9, 0.05, 0.45), factor);
                    vColor += vec3(uAudioIntensity * 0.2); // Berpendar putih saat ada audio hantaman
                }

                vec4 mvPosition = modelViewMatrix * vec4(transformed, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                
                // Ukuran partikel teks dibuat konstan tajam agar hurufnya mudah dibaca
                float sizeMultiplier = (uPreset > 1.5) ? 1.8 : 1.0;
                gl_PointSize = (aRandom.z * 3.0 + 1.5 + (uAudioIntensity * 3.0)) * (300.0 / -mvPosition.z) * sizeMultiplier;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            varying float vPreset;
            void main() {
                vec2 centerDist = gl_PointCoord - vec2(0.5);
                if (dot(centerDist, centerDist) > 0.25) discard;
                float alpha = pow(1.0 - (dot(centerDist, centerDist) * 4.0), 1.5);
                if (vPreset > 1.5) {
                    gl_FragColor = vec4(vColor * 1.5, alpha * 0.95); // Glow teks intens
                } else {
                    gl_FragColor = vec4(vColor, alpha * 0.8);
                }
            }
        `;

        // --- Fungsi Generator Teks ke Koordinat 3D ---
        function generateTextCoordinates(text, count) {
            const canvas2d = document.createElement('canvas');
            const ctx2d = canvas2d.getContext('2d');
            canvas2d.width = 512;
            canvas2d.height = 128;

            // Gambar teks dasar ke bitmap 2D
            ctx2d.fillStyle = '#000000';
            ctx2d.fillRect(0, 0, canvas2d.width, canvas2d.height);
            ctx2d.fillStyle = '#FFFFFF';
            ctx2d.font = 'bold 70px sans-serif';
            ctx2d.textAlign = 'center';
            ctx2d.textBaseline = 'middle';
            ctx2d.fillText(text, canvas2d.width / 2, canvas2d.height / 2);

            const imgData = ctx2d.getImageData(0, 0, canvas2d.width, canvas2d.height).data;
            const validPoints = [];

            // Kumpulkan piksel putih (area teks)
            for (let y = 0; y < canvas2d.height; y += 1) {
                for (let x = 0; x < canvas2d.width; x += 1) {
                    const idx = (y * canvas2d.width + x) * 4;
                    if (imgData[idx] > 128) { // Jika piksel berwarna putih
                        validPoints.push({
                            // Konversi koordinat matriks 2D kanvas ke skala koordinat 3D Three.js
                            x: (x - canvas2d.width / 2) * 0.08,
                            y: (canvas2d.height / 2 - y) * 0.08
                        });
                    }
                }
            }
            return validPoints;
        }

        function initThree() {
            try {
                const canvas = document.getElementById('visualizer-canvas');
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x040404, 0.015);

                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 30;

                renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                trackingCanvas = document.getElementById('tracking-overlay');
                trackingCtx = trackingCanvas.getContext('2d');

                buildParticleGeometry();
                window.addEventListener('resize', onWindowResize);
                document.getElementById('particle-count').innerText = particleCount.toLocaleString();
            } catch (e) {
                console.error(e);
            }
        }

        function buildParticleGeometry() {
            if (particleSystem) scene.remove(particleSystem);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const speeds = new Float32Array(particleCount);
            const randoms = new Float32Array(particleCount * 3);

            let textPoints = [];
            if (currentPreset === 'love') {
                textPoints = generateTextCoordinates("I LOVE YOU", particleCount);
            }

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                speeds[i] = Math.random() * 0.8 + 0.2;
                randoms[i3] = Math.random();
                randoms[i3 + 1] = Math.random();
                randoms[i3 + 2] = Math.random();

                if (currentPreset === 'solar') {
                    if (Math.random() < 0.15) {
                        positions[i3] = (Math.random() - 0.5) * 1.5;
                        positions[i3 + 1] = (Math.random() - 0.5) * 1.5;
                        positions[i3 + 2] = (Math.random() - 0.5) * 1.5;
                    } else {
                        const radius = Math.random() * 20 + 2.5;
                        const angle = Math.random() * Math.PI * 2;
                        positions[i3] = Math.cos(angle) * radius;
                        positions[i3 + 1] = (Math.random() - 0.5) * 0.3;
                        positions[i3 + 2] = Math.sin(angle) * radius;
                    }
                } else if (currentPreset === 'universe') {
                    const u = Math.random(), v = Math.random();
                    const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                    const r = Math.cbrt(Math.random()) * 22.0;
                    positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                    positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    positions[i3 + 2] = r * Math.cos(phi);
                } else if (currentPreset === 'love') {
                    // Petakan partikel secara rekursif ke susunan koordinat teks yang valid
                    if (textPoints.length > 0) {
                        const pt = textPoints[i % textPoints.length];
                        positions[i3] = pt.x + (Math.random() - 0.5) * 0.1; // Sedikit jitter agar organik
                        positions[i3 + 1] = pt.y + (Math.random() - 0.5) * 0.1;
                        positions[i3 + 2] = (Math.random() - 0.5) * 1.5; // Kedalaman ketebalan huruf 3D
                    } else {
                        positions[i3] = (Math.random() - 0.5) * 20;
                        positions[i3 + 1] = (Math.random() - 0.5) * 10;
                        positions[i3 + 2] = 0;
                    }
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));

            const material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: customUniforms,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }

        // --- Kamera & Filter Deteksi Eksklusif Tangan Kanan ---
        function onHandResults(results) {
            const statusEl = document.getElementById('tracking-status');
            let rightHandFound = false;

            trackingCtx.clearRect(0, 0, trackingCanvas.width, trackingCanvas.height);
            if (results.image) {
                trackingCtx.drawImage(results.image, 0, 0, trackingCanvas.width, trackingCanvas.height);
            }

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const classification = results.multiHandedness[i];
                    const landmarks = results.multiHandLandmarks[i];

                    // Tangan kanan fisik diidentifikasi sebagai 'Left' di internal non-flipped MediaPipe
                    if (classification.label === 'Left') {
                        rightHandFound = true;
                        statusEl.innerText = "Tangan Kanan Aktif";
                        statusEl.className = "text-emerald-400 font-bold";

                        if (window.drawConnectors && window.drawLandmarks) {
                            drawConnectors(trackingCtx, landmarks, HAND_CONNECTIONS, {color: '#00F0FF', lineWidth: 2});
                            drawLandmarks(trackingCtx, landmarks, {color: '#FF0077', lineWidth: 1, radius: 2});
                        }

                        const wrist = landmarks[0];
                        const thumbTip = landmarks[4];
                        const indexTip = landmarks[8];
                        const middleTip = landmarks[12];

                        // Translasi pergerakan partikel (X, Y)
                        targetPositionX = (wrist.x - 0.5) * -30.0; 
                        targetPositionY = (0.5 - wrist.y) * 20.0;

                        // Jarak cubitan jempol-telunjuk mengatur ukuran skala (Scale)
                        const dx = indexTip.x - thumbTip.x, dy = indexTip.y - thumbTip.y, dz = indexTip.z - thumbTip.z;
                        targetScale = THREE.MathUtils.clamp(Math.sqrt(dx*dx + dy*dy + dz*dz) * 6.0, 0.3, 3.0);

                        // Kemiringan pergelangan mengatur rotasi rotasi Z (Rotation)
                        const rotY = middleTip.y - wrist.y, rotX = middleTip.x - wrist.x;
                        targetRotationZ = Math.atan2(rotY, rotX) + Math.PI / 2;
                        break; // Abaikan tangan kedua (tangan kiri)
                    }
                }
            }

            if (!rightHandFound) {
                statusEl.innerText = "Mencari Tangan Kanan...";
                statusEl.className = "text-amber-400 font-medium";
                targetPositionX = 0; targetPositionY = 0; targetScale = 1.0; targetRotationZ = 0;
            }
        }

        // --- Loop Render Grafis & LERP Smoothing ---
        function animate() {
            requestAnimationFrame(animate);

            const clockTime = performance.now() * 0.001;
            customUniforms.uTime.value = clockTime;

            // Penerapan Interpolasi Linear Kontinu (LERP)
            currentPositionX += (targetPositionX - currentPositionX) * LERP_FACTOR;
            currentPositionY += (targetPositionY - currentPositionY) * LERP_FACTOR;
            currentScale     += (targetScale - currentScale) * LERP_FACTOR;
            currentRotationZ += (targetRotationZ - currentRotationZ) * LERP_FACTOR;

            if (particleSystem) {
                particleSystem.position.x = currentPositionX;
                particleSystem.position.y = currentPositionY;
                particleSystem.scale.setScalar(currentScale);
                particleSystem.rotation.z = currentRotationZ;
                
                // Rotasi orbit konstan hanya aktif pada Solar dan Universe agar teks "I LOVE YOU" tidak terbalik saat dibaca
                if (currentPreset !== 'love') {
                    particleSystem.rotation.y = clockTime * 0.05;
                    particleSystem.rotation.x = clockTime * 0.02;
                } else {
                    // Untuk teks, biarkan dia menghadap ke depan, hanya beri sedikit goyangan statis yang elegan
                    particleSystem.rotation.y = sin(clockTime * 0.5) * 0.1;
                    particleSystem.rotation.x = 0;
                }
            }

            if (isAudioInitialized && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                audioIntensity = (sum / dataArray.length) / 255.0;
                customUniforms.uAudioIntensity.value = audioIntensity * 2.5; 
            }

            renderer.render(scene, camera);
            
            // Hitung FPS Profiler
            frameCount++;
            const time = performance.now();
            if (time >= lastTime + 1000) {
                document.getElementById('fps-counter').innerText = `${Math.round((frameCount * 1000) / (time - lastTime))} FPS`;
                frameCount = 0; lastTime = time;
            }
        }

        function onWindowResize() {
            camera.aspect = window.i
