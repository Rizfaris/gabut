<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Particle Visualizer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: ui-sans-serif, system-ui, sans-serif;
            color: #fff;
        }
        #visualizer-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #webcam {
            display: none;
        }
        /* Kotak Kamera Mirror di Kanan Atas */
        #tracking-overlay {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background-color: rgba(0, 0, 0, 0.5);
            transform: scaleX(-1); /* Efek Cermin */
        }
    </style>
</head>
<body>

    <canvas id="visualizer-canvas"></canvas>
    <canvas id="tracking-overlay" width="240" height="180"></canvas>
    <video id="webcam" autoplay playsinline></video>

    <div class="absolute top-6 left-6 z-10 w-80 bg-black/50 backdrop-blur-md border border-white/10 rounded-2xl p-5 shadow-2xl">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-lg font-bold tracking-wide bg-gradient-to-r bg-clip-text text-transparent from-indigo-400 to-pink-400">Quantum Core V2</h1>
            <span id="fps-counter" class="text-xs font-mono bg-white/10 px-2 py-0.5 rounded text-cyan-300">-- FPS</span>
        </div>
        
        <p class="text-xs text-slate-400 mb-4 leading-relaxed border-b border-white/5 pb-3">
            <strong class="text-pink-400">Right Hand Only:</strong> Kotak di kanan atas menampilkan kamera Anda. Hanya tangan kanan fisik yang diproses untuk menggerakkan partikel.
        </p>

        <div class="mb-5">
            <label class="block text-xs font-semibold tracking-wider text-slate-300 uppercase mb-2">Preset System</label>
            <select id="preset-select" class="w-full bg-white/5 border border-white/10 text-sm rounded-lg p-2 text-white focus:outline-none focus:border-pink-500 cursor-pointer">
                <option value="solar" selected>Solar System</option>
                <option value="universe">Observable Universe</option>
                <option value="love">I Love You</option>
            </select>
        </div>

        <div class="mb-5">
            <div class="flex items-center justify-between mb-2">
                <label class="block text-xs font-semibold tracking-wider text-slate-300 uppercase">Audio Reactivity</label>
                <span id="audio-status" class="text-[10px] text-rose-400 font-mono uppercase">Inactive</span>
            </div>
            <button id="audio-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-xs py-2 px-4 rounded-lg transition duration-200 cursor-pointer flex items-center justify-center gap-2 shadow-lg">
                Initialize Audio Spectrum
            </button>
        </div>

        <div class="space-y-1.5 text-xs font-mono text-slate-400 border-t border-white/5 pt-3">
            <div class="flex justify-between"><span>Tracking State:</span><span id="tracking-status" class="text-amber-400">Memuat Kamera...</span></div>
            <div class="flex justify-between"><span>Active Particles:</span><span id="particle-count" class="text-slate-200">0</span></div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, particleSystem;
        let particleCount = 20000; // Dikurangi sedikit agar performa lebih lancar di semua perangkat
        let currentPreset = 'solar';

        let targetPositionX = 0, targetPositionY = 0, targetScale = 1.0, targetRotationZ = 0;
        let currentPositionX = 0, currentPositionY = 0, currentScale = 1.0, currentRotationZ = 0;
        const LERP_FACTOR = 0.08; 

        let lastTime = performance.now(), frameCount = 0;
        let audioContext, analyser, dataArray, isAudioInitialized = false, audioIntensity = 0;
        let trackingCanvas, trackingCtx;

        let customUniforms = {
            uTime: { value: 0.0 },
            uAudioIntensity: { value: 0.0 },
            uPreset: { value: 0.0 } 
        };

        const vertexShader = `
            uniform float uTime;
            uniform float uAudioIntensity;
            uniform float uPreset;
            attribute float aSpeed;
            attribute vec3 aRandom;
            varying vec3 vColor;
            varying float vPreset;

            void main() {
                vPreset = uPreset;
                vec3 transformed = position;
                
                if (uPreset < 0.5) {
                    float orbitRadius = length(position.xz);
                    float angle = uTime * aSpeed * 0.5 + aRandom.x * 6.28;
                    if (orbitRadius < 2.0) {
                        transformed = position + sin(uTime * 3.0 + aRandom * 10.0) * (0.05 + uAudioIntensity * 0.15);
                        vColor = vec3(1.0, 0.4, 0.0);
                    } else {
                        transformed.x = cos(angle) * orbitRadius;
                        transformed.z = sin(angle) * orbitRadius;
                        transformed.y = sin(uTime * aSpeed + orbitRadius) * 0.2 * (1.0 + uAudioIntensity);
                        if (orbitRadius > 12.0) vColor = vec3(0.4, 0.6, 1.0);
                        else if (orbitRadius > 6.0) vColor = vec3(0.85, 0.7, 0.45);
                        else vColor = vec3(0.9, 0.4, 0.2);
                    }
                } 
                else if (uPreset < 1.5) {
                    float expansion = 1.0 + (uTime * 0.02) + (uAudioIntensity * 0.4);
                    transformed = position * expansion;
                    float dist = length(transformed);
                    vColor = mix(vec3(0.1, 0.1, 0.5), vec3(0.8, 0.2, 0.6), clamp(dist / 30.0, 0.0, 1.0));
                } 
                else {
                    // --- PRESET I LOVE YOU (PINK) ---
                    float radius = length(position.xy);
                    float theta = uTime * 0.4 + (position.z * 0.05) + aRandom.y * 0.5;
                    float pulse = 1.0 + sin(uTime * 2.0) * 0.1 + (uAudioIntensity * 0.2);
                    
                    transformed.x = cos(theta) * radius * pulse;
                    transformed.y = sin(theta) * radius * pulse;
                    transformed.z = position.z + sin(uTime * 1.5 + radius) * 1.0;
                    
                    vColor = mix(vec3(1.0, 0.4, 0.7), vec3(0.85, 0.05, 0.5), clamp(radius / 15.0, 0.0, 1.0));
                    vColor += vec3(uAudioIntensity * 0.15);
                }

                vec4 mvPosition = modelViewMatrix * vec4(transformed, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                gl_PointSize = (aRandom.z * 4.0 + 1.5 + (uAudioIntensity * 3.0)) * (300.0 / -mvPosition.z);
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            varying float vPreset;
            void main() {
                vec2 centerDist = gl_PointCoord - vec2(0.5);
                if (dot(centerDist, centerDist) > 0.25) discard;
                float alpha = pow(1.0 - (dot(centerDist, centerDist) * 4.0), 1.5);
                if (vPreset > 1.5) {
                    gl_FragColor = vec4(vColor * 1.4, alpha);
                } else {
                    gl_FragColor = vec4(vColor, alpha * 0.8);
                }
            }
        `;

        function initThree() {
            try {
                const canvas = document.getElementById('visualizer-canvas');
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x050505, 0.02);

                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 30;

                renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                trackingCanvas = document.getElementById('tracking-overlay');
                trackingCtx = trackingCanvas.getContext('2d');

                buildParticleGeometry();
                window.addEventListener('resize', onWindowResize);
                document.getElementById('particle-count').innerText = particleCount.toLocaleString();
            } catch (e) {
                alert("Gagal menginisialisasi WebGL Grafis: " + e.message);
            }
        }

        function buildParticleGeometry() {
            if (particleSystem) scene.remove(particleSystem);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const speeds = new Float32Array(particleCount);
            const randoms = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                speeds[i] = Math.random() * 0.8 + 0.2;
                randoms[i3] = Math.random();
                randoms[i3 + 1] = Math.random();
                randoms[i3 + 2] = Math.random();

                if (currentPreset === 'solar') {
                    if (Math.random() < 0.15) {
                        positions[i3] = (Math.random() - 0.5) * 1.5;
                        positions[i3 + 1] = (Math.random() - 0.5) * 1.5;
                        positions[i3 + 2] = (Math.random() - 0.5) * 1.5;
                    } else {
                        const radius = Math.random() * 20 + 2.5;
                        const angle = Math.random() * Math.PI * 2;
                        positions[i3] = Math.cos(angle) * radius;
                        positions[i3 + 1] = (Math.random() - 0.5) * 0.3;
                        positions[i3 + 2] = Math.sin(angle) * radius;
                    }
                } else if (currentPreset === 'universe') {
                    const u = Math.random(), v = Math.random();
                    const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                    const r = Math.cbrt(Math.random()) * 22.0;
                    positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                    positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    positions[i3 + 2] = r * Math.cos(phi);
                } else {
                    const radius = Math.random() * 15.0 + 1.0;
                    const angle = Math.random() * Math.PI * 2;
                    positions[i3] = Math.cos(angle) * radius;
                    positions[i3 + 1] = Math.sin(angle) * radius;
                    positions[i3 + 2] = (Math.random() - 0.5) * 10.0;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));

            const material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: customUniforms,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }

        function onHandResults(results) {
            const statusEl = document.getElementById('tracking-status');
            let rightHandFound = false;

            trackingCtx.clearRect(0, 0, trackingCanvas.width, trackingCanvas.height);
            if (results.image) {
                trackingCtx.drawImage(results.image, 0, 0, trackingCanvas.width, trackingCanvas.height);
            }

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const classification = results.multiHandedness[i];
                    const landmarks = results.multiHandLandmarks[i];

                    // Klasifikasi 'Left' di MediaPipe non-flipped adalah tangan kanan fisik kita
                    if (classification.label === 'Left') {
                        rightHandFound = true;
                        statusEl.innerText = "Tangan Kanan Aktif";
                        statusEl.className = "text-emerald-400 font-bold";

                        // Gambar Garis Tracker
                        if (window.drawConnectors && window.drawLandmarks) {
                            drawConnectors(trackingCtx, landmarks, HAND_CONNECTIONS, {color: '#00F0FF', lineWidth: 2});
                            drawLandmarks(trackingCtx, landmarks, {color: '#FF0077', lineWidth: 1, radius: 2});
                        }

                        const wrist = landmarks[0];
                        const thumbTip = landmarks[4];
                        const indexTip = landmarks[8];
                        const middleTip = landmarks[12];

                        targetPositionX = (wrist.x - 0.5) * -30.0; 
                        targetPositionY = (0.5 - wrist.y) * 20.0;

                        const dx = indexTip.x - thumbTip.x, dy = indexTip.y - thumbTip.y, dz = indexTip.z - thumbTip.z;
                        targetScale = THREE.MathUtils.clamp(Math.sqrt(dx*dx + dy*dy + dz*dz) * 6.0, 0.3, 3.0);

                        const rotY = middleTip.y - wrist.y, rotX = middleTip.x - wrist.x;
                        targetRotationZ = Math.atan2(rotY, rotX) + Math.PI / 2;
                        break;
                    }
                }
            }

            if (!rightHandFound) {
                statusEl.innerText = "Mencari Tangan Kanan...";
                statusEl.className = "text-amber-400 font-medium";
                targetPositionX = 0; targetPositionY = 0; targetScale = 1.0; targetRotationZ = 0;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const clockTime = performance.now() * 0.001;
            customUniforms.uTime.value = clockTime;

            currentPositionX += (targetPositionX - currentPositionX) * LERP_FACTOR;
            currentPositionY += (targetPositionY - currentPositionY) * LERP_FACTOR;
            currentScale     += (targetScale - currentScale) * LERP_FACTOR;
            currentRotationZ += (targetRotationZ - currentRotationZ) * LERP_FACTOR;

            if (particleSystem) {
                particleSystem.position.x = currentPositionX;
                particleSystem.position.y = currentPositionY;
                particleSystem.scale.setScalar(currentScale);
                particleSystem.rotation.z = currentRotationZ;
                particleSystem.rotation.y = clockTime * 0.05;
                particleSystem.rotation.x = clockTime * 0.02;
            }

            if (isAudioInitialized && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                audioIntensity = (sum / dataArray.length) / 255.0;
                customUniforms.uAudioIntensity.value = audioIntensity * 2.5; 
            }

            renderer.render(scene, camera);
            
            // Hitung FPS
            frameCount++;
            const time = performance.now();
            if (time >= lastTime + 1000) {
                document.getElementById('fps-counter').innerText = `${Math.round((frameCount * 1000) / (time - lastTime))} FPS`;
                frameCount = 0; lastTime = time;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function initAudio() {
            if (isAudioInitialized) return;
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(stream => {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContext.createMediaStreamSource(stream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    source.connect(analyser);
                    isAudioInitialized = true;
                    document.getElementById('audio-status').innerText = "Live Active";
                    document.getElementById('audio-status').className = "text-emerald-400 font-mono uppercase";
                    document.getElementById('audio-btn').style.display = 'none';
                }).catch(err => {
                    alert("Gagal mengakses mikrofon: " + err.message);
                });
        }

        window.addEventListener('DOMContentLoaded', () => {
            initThree();
            animate();

            document.getElementById('preset-select').addEventListener('change', (e) => {
                currentPreset = e.target.value;
                if (currentPreset === 'solar') customUniforms.uPreset.value = 0.0;
                else if (currentPreset === 'universe') customUniforms.uPreset.value = 1.0;
                else customUniforms.uPreset.value = 2.0; 
                buildParticleGeometry();
            });

            document.getElementById('audio-btn').addEventListener('click', initAudio);

            // Inisialisasi MediaPipe Hands
            try {
                const videoElement = document.getElementById('webcam');
                const hands = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });

                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                hands.onResults(onHandResults);

                const cameraUtils = new Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({ image: videoElement });
                    },
                    width: 640,
                    height: 480
                });

                cameraUtils.start().then(() => {
                    document.getElementById('tracking-status').innerText = "Mencari Tangan...";
                }).catch(err => {
                    alert("Kamera tidak ditemukan atau diblokir oleh browser. Silakan izinkan akses kamera.");
                    document.getElementById('tracking-status').innerText = "Kamera Diblokir";
                });

            } catch (err) {
                alert("Gagal memuat sistem pelacakan MediaPipe: " + err.message);
            }
        });
    </script>
</body>
</html>
